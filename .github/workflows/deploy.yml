name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HTML Validation
        uses: cygnetdigital/html-validate-action@v1
        with:
          index: 'thai-exam-hub/index.html'

      - name: JSON Lint
        run: |
          find thai-exam-hub/data -name "*.json" -type f -exec jsonlint -q {} +

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './thai-exam-hub'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
